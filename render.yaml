services:
  - type: web
    name: smart-delivery-analytics-api
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: AI_PROVIDER
        value: deterministic
      - key: PYTHONUNBUFFERED
        value: "1"
